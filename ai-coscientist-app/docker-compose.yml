services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: open-coscientist-api
    env_file:
      - .env
    ports:
      - "8008:8008"
    environment:
      - MCP_SERVER_URL=http://mcp:8888/mcp
      - COSCIENTIST_CACHE_DIR=/app/cache
      # override these to clone a different fork/branch of open-coscientist
      - OPEN_COSCIENTIST_REPO=https://github.com/jataware/open-coscientist.git
      - OPEN_COSCIENTIST_REF=main
      # remap TOOLS_CONFIG to the container path (overrides any local absolute path in .env)
      # open-coscientist is mounted at /workspace/open-coscientist
      # Hardcoded to cancer tools using reference mcp server (pubmed + INDRA)
      # can be configured for other files, or removed if PubMed suffices
      - TOOLS_CONFIG=/workspace/open-coscientist/src/open_coscientist/config/examples/indra_cancer.yaml
    volumes:
      - ./cache:/app/cache
      - ./app:/app/app
      # mount local open-coscientist checkout; entrypoint clones from GitHub if absent
      - ${OPEN_COSCIENTIST_PATH:-../open-coscientist}:/workspace/open-coscientist
    depends_on:
      mcp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8008/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: open-coscientist-ui
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  mcp:
    build:
      context: ${OPEN_COSCIENTIST_PATH:-../open-coscientist}
      dockerfile: mcp_server/Dockerfile
    container_name: open-coscientist-mcp
    ports:
      - "8888:8888"
    environment:
      - COSCIENTIST_MCP_PORT=8888
      # set ENTREZ_EMAIL here (or in .env) for PubMed access; server degrades gracefully without it
      # - ENTREZ_EMAIL=you@example.com
    volumes:
      - ${OPEN_COSCIENTIST_PATH:-../open-coscientist}/mcp_server/paper_cache:/app/mcp_server/paper_cache
      - ${OPEN_COSCIENTIST_PATH:-../open-coscientist}/mcp_server:/app/mcp_server
    command: >
      uvicorn mcp_server.server:app
      --host 0.0.0.0
      --port 8888
      --reload
      --reload-dir mcp_server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8888', timeout=5.0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
