    </marker>
  </defs>

  <text x="470" y="22" class="title">WorkflowState — Data Flow &amp; Custom Reducers</text>
  <text x="470" y="38" class="subtitle">Nodes return deltas; two annotated fields use reducers, all other fields overwrite</text>

