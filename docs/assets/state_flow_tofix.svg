  <rect x="220" y="60" width="500" height="360" rx="12" class="state-box"/>
  <text x="470" y="78" class="label-sm">WorkflowState (TypedDict)  ·  state.py:118</text>

  <!-- inputs group -->
  <rect x="240" y="92" width="200" height="52" rx="8" class="group"/>
  <text x="340" y="108" class="label-sm">inputs</text>
