    .group { fill: #ffffff; stroke: #BEC9C9; stroke-width: 1.2; }
    .group-reducer { fill: #FFF8E1; stroke: #F59E0B; stroke-width: 1.5; }
    .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; font-weight: 600; fill: #002021; text-anchor: middle; dominant-baseline: central; }
    .label-sm { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 10px; font-weight: 600; fill: #002021; text-anchor: middle; dominant-baseline: central; }
    .label-xs { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 9px; font-weight: 400; fill: #6F7979; text-anchor: middle; dominant-baseline: central; }
    .label-left { text-anchor: start; }
    .label-badge { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 9px; font-weight: 700; fill: #7C4700; text-anchor: middle; dominant-baseline: central; }
    .arrow { stroke: #00696C; stroke-width: 1.4; fill: none; marker-end: url(#ah2); }
    .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 600; fill: #171D1D; text-anchor: middle; }
    .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 10px; font-weight: 400; fill: #6F7979; text-anchor: middle; }
    .badge-d { fill: #F59E0B; }
  </style>
  <defs>
    <marker id="ah2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
