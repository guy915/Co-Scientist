services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: coscientist-api
    env_file:
      - .env
    ports:
      - "8008:8008"
    environment:
      - MCP_SERVER_URL=http://mcp:8888/mcp
      - COSCIENTIST_CACHE_DIR=/app/cache
      # override these to clone a different fork/branch of the engine
      - COSCIENTIST_ENGINE_REPO=
      - COSCIENTIST_ENGINE_REF=main
      # remap TOOLS_CONFIG to the container path (overrides any local absolute path in .env)
      # engine is mounted at /workspace/co-scientist-engine
      # Hardcoded to cancer tools using reference mcp server (pubmed + INDRA)
      # can be configured for other files, or removed if PubMed suffices
      - TOOLS_CONFIG=/workspace/co-scientist-engine/src/co_scientist/config/examples/indra_cancer.yaml
    volumes:
      - ./cache:/app/cache
      - ./app:/app/app
      # mount local engine checkout; entrypoint can clone if COSCIENTIST_ENGINE_REPO is set
      - ${COSCIENTIST_ENGINE_PATH:-../engine}:/workspace/co-scientist-engine
    depends_on:
      mcp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8008/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coscientist-ui
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  mcp:
    build:
      context: ${COSCIENTIST_ENGINE_PATH:-../engine}
      dockerfile: mcp_server/Dockerfile
    container_name: coscientist-mcp
    ports:
      - "8888:8888"
    environment:
      - COSCIENTIST_MCP_PORT=8888
      # set ENTREZ_EMAIL here (or in .env) for PubMed access; server degrades gracefully without it
      # - ENTREZ_EMAIL=you@example.com
    volumes:
      - ${COSCIENTIST_ENGINE_PATH:-../engine}/mcp_server/paper_cache:/app/mcp_server/paper_cache
      - ${COSCIENTIST_ENGINE_PATH:-../engine}/mcp_server:/app/mcp_server
    command: >
      uvicorn mcp_server.server:app
      --host 0.0.0.0
      --port 8888
      --reload
      --reload-dir mcp_server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8888', timeout=5.0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
